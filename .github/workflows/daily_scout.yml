name: Daily Nifty Scout Report

on:
  schedule:
    # 10:30 UTC = 4:00 PM IST, after NSE market close (3:30 PM IST)
    - cron: "30 10 * * 1-5"
  workflow_dispatch: {} # allows manual trigger from the Actions tab

permissions:
  contents: write # required so the workflow can commit output back

jobs:
  run-scout-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Configure git identity for auto-commit
        run: |
          git config --global user.name "nifty-scout-bot"
          git config --global user.email "actions@users.noreply.github.com"

      - name: Run pipeline
        working-directory: .
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python src/main.py

      - name: Upload run log as artifact (debugging aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log
          path: output/run.log
          if-no-files-found: ignore
